<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="0" height="0" viewBox="0 0 0 0" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Generic Dharma Station Marker -->
    <symbol id="dharma-marker" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="none" stroke="white" stroke-width="2" />
      <circle cx="20" cy="20" r="15" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1" />
      <circle cx="20" cy="20" r="2" fill="white" />
      <path d="M20,5 L20,10 M20,30 L20,35 M5,20 L10,20 M30,20 L35,20" stroke="white" stroke-width="2" />
    </symbol>
    
    <!-- Swan Station (3) -->
    <symbol id="swan-station" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="none" stroke="white" stroke-width="2" />
      <circle cx="20" cy="20" r="15" fill="white" fill-opacity="0.1" />
      <path d="M13,15 C13,10 20,10 20,15 C20,10 27,10 27,15 C27,20 20,25 20,25 C20,25 13,20 13,15 Z" 
            fill="white" stroke="white" stroke-width="1" />
      <text x="20" y="31" font-family="Arial" font-size="8" fill="white" text-anchor="middle">3</text>
    </symbol>
    
    <!-- Pearl Station (5) -->
    <symbol id="pearl-station" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="none" stroke="white" stroke-width="2" />
      <circle cx="20" cy="20" r="15" fill="white" fill-opacity="0.1" />
      <circle cx="20" cy="20" r="8" fill="none" stroke="white" stroke-width="1.5" />
      <circle cx="20" cy="20" r="4" fill="white" fill-opacity="0.7" />
      <text x="20" y="31" font-family="Arial" font-size="8" fill="white" text-anchor="middle">5</text>
    </symbol>
    
    <!-- Flame Station (4) -->
    <symbol id="flame-station" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="none" stroke="white" stroke-width="2" />
      <circle cx="20" cy="20" r="15" fill="white" fill-opacity="0.1" />
      <path d="M15,30 L20,10 L25,30 L15,30 Z" fill="none" stroke="white" stroke-width="1.5" />
      <path d="M17,27 L20,15 L23,27 L17,27 Z" fill="white" fill-opacity="0.7" />
      <text x="20" y="35" font-family="Arial" font-size="8" fill="white" text-anchor="middle">4</text>
    </symbol>
    
    <!-- Arrow Station (1) -->
    <symbol id="arrow-station" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="none" stroke="white" stroke-width="2" />
      <circle cx="20" cy="20" r="15" fill="white" fill-opacity="0.1" />
      <path d="M10,20 L30,20 M30,20 L23,15 M30,20 L23,25" fill="none" stroke="white" stroke-width="1.5" />
      <text x="20" y="31" font-family="Arial" font-size="8" fill="white" text-anchor="middle">1</text>
    </symbol>
    
    <!-- Staff Station (6) -->
    <symbol id="staff-station" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="none" stroke="white" stroke-width="2" />
      <circle cx="20" cy="20" r="15" fill="white" fill-opacity="0.1" />
      <path d="M20,10 L20,30 M15,13 L25,13" fill="none" stroke="white" stroke-width="1.5" />
      <path d="M17,17 C17,17 20,21 20,25 C20,21 23,17 23,17" fill="none" stroke="white" stroke-width="1.5" />
      <text x="20" y="35" font-family="Arial" font-size="8" fill="white" text-anchor="middle">6</text>
    </symbol>
    
    <!-- Orchid Station (7) -->
    <symbol id="orchid-station" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" fill="none" stroke="white" stroke-width="2" />
      <circle cx="20" cy="20" r="15" fill="white" fill-opacity="0.1" />
      <path d="M20,16 C17,16 15,19 15,22 C15,25 17,28 20,28 C23,28 25,25 25,22 C25,19 23,16 20,16 Z" 
            fill="none" stroke="white" stroke-width="1.5" />
      <path d="M20,12 L20,16 M20,28 L20,32" fill="none" stroke="white" stroke-width="1.5" />
      <text x="20" y="37" font-family="Arial" font-size="8" fill="white" text-anchor="middle">7</text>
    </symbol>

    <!-- Dharma Pulse Animation for Discovered Stations -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
</svg>