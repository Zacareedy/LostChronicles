<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background ocean -->
  <rect x="0" y="0" width="800" height="800" fill="#1e3c72" />
  
  <!-- Ocean gradient -->
  <radialGradient id="oceanGradient" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
    <stop offset="0%" stop-color="#2a5298" />
    <stop offset="100%" stop-color="#1e3c72" />
  </radialGradient>
  <rect x="0" y="0" width="800" height="800" fill="url(#oceanGradient)" />
  
  <!-- Island gradient -->
  <linearGradient id="islandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#2d5f2d" />
    <stop offset="50%" stop-color="#3b7a3b" />
    <stop offset="100%" stop-color="#2d5f2d" />
  </linearGradient>
  
  <!-- Island SVG based on the LOST island map -->
  <path d="M241,115 C263,107 290,100 319,97 C348,95 374,95 397,98 
           C420,102 445,110 472,120 C499,131 515,145 533,162 
           C550,179 567,197 582,223 C597,249 610,275 618,311 
           C626,346 630,376 631,406 C632,436 630,464 624,490 
           C618,517 610,543 595,569 C580,594 564,615 536,637 
           C508,659 477,675 444,685 C411,695 375,700 336,699 
           C297,698 260,692 223,677 C186,662 158,645 134,620 
           C110,595 94,565 82,532 C70,499 64,464 65,431 
           C66,398 75,363 89,334 C103,305 121,281 144,260 
           C167,239 193,220 215,203 C237,186 248,170 241,115 Z" 
     fill="url(#islandGradient)" stroke="#224422" stroke-width="3" />
     
  <!-- Mountain ridge features -->
  <linearGradient id="mountainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1a3a1a" />
    <stop offset="40%" stop-color="#2a4a2a" />
    <stop offset="60%" stop-color="#253a25" />
    <stop offset="100%" stop-color="#1a3a1a" />
  </linearGradient>
  
  <path d="M361,226 C380,214 406,196 436,184 C466,172 490,168 512,179 
           C534,190 551,210 565,240 C579,270 589,304 593,338 
           C597,372 594,407 585,441 C576,475 559,504 536,530 
           C513,556 486,578 456,594 C426,610 394,618 364,618 
           C334,618 306,610 285,594 C264,578 250,553 246,518 
           C242,483 246,448 258,415 C270,382 290,351 311,326 
           C332,301 342,238 361,226 Z"
     fill="url(#mountainGradient)" stroke="#1f3f1f" stroke-width="2" />
     
  <!-- Mountain texture for the ridges -->
  <pattern id="mountainPattern" patternUnits="userSpaceOnUse" width="40" height="40">
    <path d="M0,40 L10,30 L20,35 L30,25 L40,40" fill="none" stroke="#1f3f1f" stroke-width="1" stroke-opacity="0.3" />
    <path d="M0,25 L10,15 L20,20 L30,10 L40,25" fill="none" stroke="#1f3f1f" stroke-width="1" stroke-opacity="0.3" />
  </pattern>
  
  <path d="M361,226 C380,214 406,196 436,184 C466,172 490,168 512,179 
           C534,190 551,210 565,240 C579,270 589,304 593,338 
           C597,372 594,407 585,441 C576,475 559,504 536,530 
           C513,556 486,578 456,594 C426,610 394,618 364,618 
           C334,618 306,610 285,594 C264,578 250,553 246,518 
           C242,483 246,448 258,415 C270,382 290,351 311,326 
           C332,301 342,238 361,226 Z"
     fill="url(#mountainPattern)" fill-opacity="0.2" />
     
  <!-- Rivers and waterways -->
  <linearGradient id="riverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#73b4ff" />
    <stop offset="100%" stop-color="#4a90e2" />
  </linearGradient>
  
  <path d="M370,95 C375,130 385,180 400,230 C408,258 416,290 425,325 
           C434,360 440,390 445,425 C450,460 455,490 458,525 
           C461,560 462,595 460,625 C458,655 455,680 450,700"
     fill="none" stroke="url(#riverGradient)" stroke-width="3" stroke-opacity="0.7" />
     
  <path d="M550,240 C530,280 520,330 515,380 C510,430 508,480 510,530 
           C512,580 518,620 525,650"
     fill="none" stroke="url(#riverGradient)" stroke-width="2" stroke-opacity="0.7" />
     
  <!-- Central lake -->
  <radialGradient id="lakeGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
    <stop offset="0%" stop-color="#73b4ff" />
    <stop offset="100%" stop-color="#4a90e2" />
  </radialGradient>
  
  <ellipse cx="445" cy="440" rx="35" ry="25" 
           fill="url(#lakeGradient)" stroke="#2a5082" stroke-width="1" />
     
  <!-- Coastal details -->
  <path d="M300,98 C315,94 330,92 345,93 C360,94 370,97 380,100" 
        fill="none" stroke="#ffcc88" stroke-width="2" stroke-opacity="0.6" />
        
  <path d="M620,310 C624,325 628,340 630,355 C632,370 633,385 632,400" 
        fill="none" stroke="#ffcc88" stroke-width="2" stroke-opacity="0.6" />
        
  <path d="M180,610 C195,620 215,628 240,635 C265,642 290,645 315,648" 
        fill="none" stroke="#ffcc88" stroke-width="2" stroke-opacity="0.6" />
        
  <path d="M75,400 C80,380 85,360 95,340 C105,320 115,300 130,280" 
        fill="none" stroke="#ffcc88" stroke-width="2" stroke-opacity="0.6" />
  
  <!-- Grid overlay for coordinates -->
  <g stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.2">
    <!-- Horizontal grid lines -->
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="0" y1="500" x2="800" y2="500" />
    <line x1="0" y1="600" x2="800" y2="600" />
    <line x1="0" y1="700" x2="800" y2="700" />
    
    <!-- Vertical grid lines -->
    <line x1="100" y1="0" x2="100" y2="800" />
    <line x1="200" y1="0" x2="200" y2="800" />
    <line x1="300" y1="0" x2="300" y2="800" />
    <line x1="400" y1="0" x2="400" y2="800" />
    <line x1="500" y1="0" x2="500" y2="800" />
    <line x1="600" y1="0" x2="600" y2="800" />
    <line x1="700" y1="0" x2="700" y2="800" />
  </g>
  
  <!-- Title -->
  <text x="50" y="50" font-family="Arial" font-size="24" font-weight="bold" fill="#ffffff">LOST ISLAND</text>
  
  <!-- Compass rose -->
  <g transform="translate(680, 120)">
    <circle cx="0" cy="0" r="30" fill="#1a365d" stroke="#ffffff" stroke-width="1" opacity="0.7" />
    <path d="M0,-25 L5,-5 L0,0 L-5,-5 Z" fill="#ffffff" />
    <path d="M0,25 L5,5 L0,0 L-5,5 Z" fill="#ffffff" opacity="0.7" />
    <path d="M-25,0 L-5,5 L0,0 L-5,-5 Z" fill="#ffffff" opacity="0.7" />
    <path d="M25,0 L5,5 L0,0 L5,-5 Z" fill="#ffffff" opacity="0.7" />
    <text x="0" y="-15" font-family="Arial" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">N</text>
    <text x="15" y="0" font-family="Arial" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">E</text>
    <text x="0" y="18" font-family="Arial" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">S</text>
    <text x="-15" y="0" font-family="Arial" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">W</text>
  </g>
  
  <!-- Station markers will be added by the React component -->
</svg>